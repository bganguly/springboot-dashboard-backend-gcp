steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials "$_CLUSTER" \
          --zone "$_ZONE" --project "$PROJECT_ID"

        _ns="$_NAMESPACE"

        # Scale to 0 before applying to clear all pods from stale ReplicaSets.
        # Deleting individual Pending pods doesn't work — the RS controller
        # immediately recreates them. Scaling the deployment to 0 clears all RSes.
        # Recreate strategy in deployment.yaml ensures no resource overlap on rollout.
        kubectl scale deployment/"${_ns}-backend" -n "${_ns}" --replicas=0 2>/dev/null || true

        _sed() {
          sed \
            -e "s|namespace: dash$|namespace: ${_ns}|g" \
            -e "s|name: dash$|name: ${_ns}|g" \
            -e "s|name: dash-backend|name: ${_ns}-backend|g" \
            -e "s|app: dash-backend|app: ${_ns}-backend|g" \
            -e "s|name: dash-db-url|name: ${_ns}-db-url|g" \
            -e "s|serviceAccountName: dash-backend-ksa|serviceAccountName: ${_ns}-ksa|g" \
            -e "s|IMAGE_PLACEHOLDER|$_IMAGE|g" \
            "$1"
        }

        _sed namespace.yaml  | kubectl apply -f -
        _sed deployment.yaml \
          | sed "s|failureThreshold: 60|failureThreshold: $_STARTUP_THRESHOLD|g" \
          | kubectl apply -f -
        _sed service.yaml    | kubectl apply -f -
        _sed hpa.yaml        | kubectl apply -f -
        kubectl delete ingress "${_ns}-backend" -n "${_ns}" --ignore-not-found

        kubectl create serviceaccount "${_ns}-ksa" -n "${_ns}" \
          --dry-run=client -o yaml | kubectl apply -f -

        DB_URL=$$(gcloud secrets versions access latest \
          --secret="${_ns}-database-url" --project="$PROJECT_ID")
        DB_HOST=$$(echo "$$DB_URL" | sed 's|.*@\([^:@]*\):[0-9]*/.*|\1|')
        DB_PORT=$$(echo "$$DB_URL" | sed 's|.*:\([0-9]*\)/[^/]*$$|\1|')
        echo "=== DB host: $$DB_HOST  port: $$DB_PORT ==="

        kubectl create secret generic "${_ns}-db-url" \
          --from-literal=url="$$DB_URL" \
          -n "${_ns}" \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "=== probing DB connectivity from cluster node ==="
        kubectl run db-probe --image=busybox:1.36 --rm --restart=Never \
          -n "${_ns}" --timeout=40s \
          -- sh -c "nc -z -w 5 $$DB_HOST $$DB_PORT \
            && echo 'DB_REACHABLE' \
            || echo 'DB_UNREACHABLE'" 2>/dev/null || echo "(probe pod timed out)"

        # Background heartbeat: every 30s print pod phase, startup probe counts, and tail logs.
        _heartbeat() {
          local n=0
          while true; do
            sleep 30
            n=$(( n + 1 ))
            echo "--- heartbeat ${n} (${_ns}-backend) ---"
            kubectl get pods -n "${_ns}" -l "app=${_ns}-backend" \
              -o wide --no-headers 2>/dev/null || true
            for pod in $$(kubectl get pods -n "${_ns}" -l "app=${_ns}-backend" \
                -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "  [pod: $$pod — startup probe failures]"
              kubectl get pod "$$pod" -n "${_ns}" \
                -o jsonpath='{range .status.containerStatuses[*]}  {.name}: started={.started} ready={.ready} restarts={.restartCount}{"\n"}{end}' 2>/dev/null || true
              echo "  [recent logs]"
              kubectl logs "$$pod" -n "${_ns}" --tail=20 2>/dev/null || true
              echo "  [last event]"
              kubectl get events -n "${_ns}" \
                --field-selector "involvedObject.name=$$pod" \
                --sort-by='.lastTimestamp' 2>/dev/null | tail -3 || true
            done
          done
        }
        _heartbeat &
        _HB_PID=$$!

        # apply already triggers rolling update when image changes; no restart needed
        if ! kubectl rollout status deployment/"${_ns}-backend" \
            --namespace "${_ns}" --timeout=900s; then
          kill "$$_HB_PID" 2>/dev/null || true
          echo "=== rollout timed out — full diagnostics ==="
          kubectl get pods -n "${_ns}" -o wide
          echo "--- events ---"
          kubectl get events -n "${_ns}" --sort-by='.lastTimestamp' | tail -30
          echo "--- pod describe ---"
          kubectl describe pods -n "${_ns}" -l "app=${_ns}-backend" 2>/dev/null | tail -60
          echo "--- pod logs (last 100 lines) ---"
          for pod in $$(kubectl get pods -n "${_ns}" -l "app=${_ns}-backend" \
              -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "  [pod: $$pod]"
            kubectl logs "$$pod" -n "${_ns}" --tail=100 2>/dev/null || true
          done
          exit 1
        fi
        kill "$$_HB_PID" 2>/dev/null || true

timeout: 1800s
substitutions:
  _IMAGE: ''
  _CLUSTER: dash-lite-cluster
  _ZONE: us-central1-a
  _NAMESPACE: dash-lite
  _STARTUP_THRESHOLD: '60'
